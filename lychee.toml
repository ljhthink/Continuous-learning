# lychee 链接检查配置
# https://lychee.cli.rs/

# 排除需要登录或会失效的域名
# （regex 匹配 URL 子串；用 literal string '...' 避免 TOML 反斜杠转义）
exclude = [
  'localhost',
  '127\.0\.0\.1',
  # 素材库网站禁止 bot 访问（ARCH.md 中作为前端素材备选链接，返回 403/401）
  'flaticon\.com',
  'lottiefiles\.com',
  'pixabay\.com',
  'unsplash\.com',
  'pexels\.com',
  # texturelabs.org 返回 202 Accepted（lychee accept 列表未含 202），素材库网站可达但不稳定
  'texturelabs\.org',
  # CSDN 博客不稳定（521 服务器宕机 / connection reset by peer）
  'blog\.csdn\.net',
  # claude.com 301 重定向未跟随
  'support\.claude\.com',
  # npmjs.com 包页面返回 403
  'npmjs\.com',
]

# 文件过滤由 docs.yml args '**/*.md' 处理
# （lychee include 字段是 URL regex 过滤器，非文件 glob；误用会导致 regex parse error）

# 超时与重试
timeout = 20
max_retries = 2

# 接受这些状态码
accept = [200, 206, 429]

# 跳过 GitHub 锚点（fragment 通常需 JS 渲染）
# v0.24.2 期望 string："none" / "anchor-only" / "text-only" / "full"
include_fragments = "none"
