# lychee 链接检查配置
# https://lychee.cli.rs/

# 排除需要登录或会失效的域名
exclude = [
  "localhost",
  "127.0.0.1",
]

# 文件过滤由 docs.yml args '**/*.md' 处理
# （lychee include 字段是 URL regex 过滤器，非文件 glob；误用会导致 regex parse error）

# 超时与重试
timeout = 20
max_retries = 2

# 接受这些状态码
accept = [200, 206, 429]

# 跳过 GitHub 锚点（fragment 通常需 JS 渲染）
# v0.24.2 期望 string："none" / "anchor-only" / "text-only" / "full"
include_fragments = "none"
